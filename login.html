<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Eventix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" style="display:inline-flex;align-items:center;gap:0.75rem;text-decoration:none;">
                    <div class="logo-icon" style="margin:0;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <span class="logo-name">Eventix</span>
                </a>
            </div>
            <h2 class="auth-title">Welcome Back!</h2>
            <p class="auth-sub">Login to your account</p>

            <div class="alert alert-danger" id="errorAlert" style="display:none;">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                    <path d="M15 9l-6 6M9 9l6 6" stroke="currentColor" stroke-width="2" />
                </svg>
                <span id="errorMsg">Email atau password salah.</span>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="masukkan@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="••••••••" required>
                </div>
                <a href="forgot-password.html" class="forgot-link">Forgot your password?</a>
                <div class="form-check">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Ingat saya</label>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;padding:0.875rem;font-size:1rem;">
                    Masuk
                </button>
            </form>

            <div class="auth-link">Belum punya akun? <a href="register.html">Register here</a></div>

            <div
                style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.08);text-align:center;">
                <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">Demo Credentials</p>
                <p style="font-size:0.78rem;color:rgba(255,255,255,0.5);font-family:monospace;">admin@eventix.com /
                    password<br>user@eventix.com / password</p>
            </div>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if (email === 'admin@eventix.com' && pass === 'password') {
                window.location.href = 'admin-dashboard.html';
            } else if (email === 'user@eventix.com' && pass === 'password') {
                window.location.href = 'tickets.html';
            } else {
                document.getElementById('errorAlert').style.display = 'flex';
                document.getElementById('errorMsg').textContent = 'Email atau password salah. Gunakan demo credentials di bawah.';
            }
        }
    </script>
</body>

</html>
