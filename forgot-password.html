<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Eventix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" style="display:inline-flex;align-items:center;gap:0.75rem;text-decoration:none;">
                    <div class="logo-icon" style="margin:0;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <span class="logo-name">Eventix</span>
                </a>
            </div>
            <h2 class="auth-title">Lupa Password?</h2>
            <p class="auth-sub">Masukkan email Anda untuk menerima instruksi reset password.</p>

            <div class="alert alert-success" id="successAlert" style="display:none;">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2" />
                    <polyline points="22 4 12 14.01 9 11.01" stroke="currentColor" stroke-width="2" />
                </svg>
                <span>Instruksi telah dikirim ke email Anda!</span>
            </div>

            <form onsubmit="handleForgot(event)" id="forgotForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="masukkan@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;padding:0.875rem;font-size:1rem;">
                    Kirim Instruksi
                </button>
            </form>

            <div class="auth-link">Kembali ke <a href="login.html">Login</a></div>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        function handleForgot(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = '⏳ Mengirim...';
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('forgotForm').style.display = 'none';
                document.getElementById('successAlert').style.display = 'flex';
                // For demo purposes, we also add a button to go to reset page
                const resetLink = document.createElement('div');
                resetLink.style.marginTop = '1.5rem';
                resetLink.style.textAlign = 'center';
                resetLink.innerHTML = '<a href="reset-password.html" class="btn btn-outline btn-sm">Demo: Buka Link Reset</a>';
                document.querySelector('.auth-card').appendChild(resetLink);
            }, 1500);
        }
    </script>
</body>

</html>
