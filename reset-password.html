<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Eventix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" style="display:inline-flex;align-items:center;gap:0.75rem;text-decoration:none;">
                    <div class="logo-icon" style="margin:0;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <span class="logo-name">Eventix</span>
                </a>
            </div>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-sub">Tentukan password baru Anda di bawah ini.</p>

            <form onsubmit="handleReset(event)" id="resetForm">
                <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input type="password" id="newPass" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Konfirmasi Password Baru</label>
                    <input type="password" id="confirmPass" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;padding:0.875rem;font-size:1rem;">
                    Ganti Password
                </button>
            </form>

            <div class="auth-link">Kembali ke <a href="login.html">Login</a></div>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        function handleReset(e) {
            e.preventDefault();
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if (pass !== confirm) {
                alert('Konfirmasi password tidak cocok!');
                return;
            }

            const btn = e.target.querySelector('button');
            btn.textContent = '⏳ Mengganti...';
            btn.disabled = true;

            setTimeout(() => {
                alert('✅ Password berhasil diganti!');
                window.location.href = 'login.html';
            }, 1500);
        }
    </script>
</body>

</html>
